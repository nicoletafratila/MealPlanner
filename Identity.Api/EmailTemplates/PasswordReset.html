<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PasswordReset_Title}}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333333;
        }

        p {
            color: #555555;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #2196F3;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #aaaaaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>{{PasswordReset_Heading}}</h2>
        <p>{{PasswordReset_Body}}</p>
        <a href="{{ResetUrl}}" class="btn">{{PasswordReset_ButtonText}}</a>
        <p>{{PasswordReset_FallbackText}}</p>
        <p><a href="{{ResetUrl}}">{{ResetUrl}}</a></p>
        <div class="footer">
            <p>{{PasswordReset_FooterText}}</p>
        </div>
    </div>
</body>
</html>
